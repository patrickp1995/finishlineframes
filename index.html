<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finish Line Frames</title>
<style>
  /* Grundstil */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    padding-top: 70px; /* Platz für Menüleiste */
    background-color: black;
  }

  /* Navbar */
  .navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    z-index: 1000;
  }

  .logo {
    font-weight: bold;
    font-size: 20px;
    color: white;
  }

  .nav-links {
    list-style: none;
    display: flex;
    gap: 30px;
    margin: 0;
    padding: 0;
  }

  .nav-links li a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;
  }

  .nav-links li a:hover {
    color: #00ffcc;
  }

  /* Überschrift */
  h1 {
    text-align: center;
    font-size: 60px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 20px 0 10px 0;
  }

  /* Zitat */
  #quote {
    font-size: 22px;
    font-style: italic;
    text-align: center;
    margin-bottom: 30px;
  }

  /* Hintergrundvideo */
  #bg-video {
    position: absolute;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  @media (max-width: 768px) {
    h1 {
      font-size: 40px;
    }

    .nav-links {
      gap: 15px;
    }

    #quote {
      font-size: 18px;
    }
  }
</style>
</head>
<body>

<!-- Horizontale Menüleiste -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Quotes</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<!-- Überschrift -->
<h1>Finish Line Frames</h1>

<!-- Zitat direkt unter Überschrift -->
<p id="quote"></p>

<!-- Hintergrundvideo -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="sport.mp4" type="video/mp4">
</video>

<!-- JavaScript für tägliches Zitat -->
<script>
  const quotes = [
    "The first step is always the hardest.",
    "You don’t have to be fast, you just have to start.",
    "Run when you can, walk if you have to, never quit.",
    "Every mile brings you closer to yourself.",
    "Pain is temporary. Pride is forever.",
    "Discipline beats motivation.",
    "Run your own race.",
    "No excuses. Just run.",
    "Sweat now, shine later.",
    "Your only limit is you."
  ];

  const today = new Date().getDate();
  const index = today % quotes.length;

  document.getElementById("quote").innerText = quotes[index];
</script>

</body>
</html>
