<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finish Line Frames</title>
<link href="style.css" rel="stylesheet">
</head>

<body>

<!-- Menü oben -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>
  <div class="menu-toggle" id="menuBtn">☰</div>

  <ul class="nav-links" id="navLinks">
    <li><a href="#">Home</a></li>
    <li><a href="#">Quotes</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<!-- Zitat direkt unter dem Menü -->
<div id="quote-container">
  <p id="quote"></p>
</div>

<!-- Überschrift -->
<h1>Finish Line Frames</h1>

<!-- Video -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="sport.mp4" type="video/mp4">
</video>

<!-- JavaScript -->
<script>
  // Liste der englischen Lauf-Zitate
  const quotes = [
    "The first step is always the hardest.",
    "You don’t have to be fast, you just have to start.",
    "Run when you can, walk if you have to, never quit.",
    "Every mile brings you closer to yourself.",
    "Pain is temporary. Pride is forever.",
    "Discipline beats motivation.",
    "Run your own race.",
    "No excuses. Just run.",
    "Sweat now, shine later.",
    "Your only limit is you."
  ];

  // Berechne das Zitat für den Tag
  const today = new Date().getDate();
  const index = today % quotes.length;

  // Setze das Zitat ins HTML
  document.getElementById("quote").innerText = quotes[index];

  // Menü-Funktion
  const menuBtn = document.getElementById("menuBtn");
  const navLinks = document.getElementById("navLinks");

  menuBtn.addEventListener("click", () => {
    navLinks.classList.toggle("active");
  });
</script>

</body>
</html>
🔹 Checkliste
Alles JS in <script> → wichtig
Zitat-Logik vor document.getElementById("quote")
Menu-Funktion innerhalb von JS-Block → funktioniert jetzt richtig
Zitat unter Menü → <div id="quote-container">
