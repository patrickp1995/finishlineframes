<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar Pro Design</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}

/* ================= NAVBAR ================= */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 25px;
  box-sizing: border-box;

  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(255,255,255,0.1);
  z-index: 1000;
}

/* LOGO */
.logo {
  font-weight: 800;
  letter-spacing: 2px;
  font-size: 18px;
}

/* LINKS */
.nav-links {
  list-style: none;
  display: flex;
  gap: 25px;
  margin: 0;
  padding: 0;
}

.nav-links li {
  position: relative;
}

.nav-links a {
  text-decoration: none;
  color: white;
  font-size: 15px;
  position: relative;
  padding: 5px 0;
}

/* underline animation */
.nav-links a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;
  width: 0%;
  height: 2px;
  background: #00ffcc;
  transition: 0.3s ease;
}

.nav-links a:hover::after {
  width: 100%;
}

/* DROPDOWN */
.dropdown-menu {
  position: absolute;
  top: 35px;
  left: 0;
  background: rgba(0,0,0,0.9);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;

  min-width: 160px;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

.dropdown-menu a {
  padding: 10px 15px;
  font-size: 14px;
}

.dropdown-menu a:hover {
  background: rgba(255,255,255,0.08);
}

/* show dropdown */
.dropdown:hover .dropdown-menu {
  display: flex;
}

/* ================= MOBILE ================= */
.menu-toggle {
  display: none;
  font-size: 28px;
  cursor: pointer;
}

@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: fixed;
    top: 70px;
    right: -100%;
    width: 250px;
    height: calc(100vh - 70px);
    background: rgba(0,0,0,0.95);
    flex-direction: column;
    gap: 20px;
    padding: 30px;
    transition: 0.3s ease;
  }

  .nav-links.active {
    right: 0;
  }

  .dropdown-menu {
    position: static;
    display: none;
    background: none;
    border: none;
  }

  .dropdown.active .dropdown-menu {
    display: flex;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

  <div class="logo">🏁 FLF</div>

  <ul class="nav-links" id="navLinks">

    <li><a href="index.html">Home</a></li>

    <li class="dropdown">
      <a href="#">Pictures</a>
      <div class="dropdown-menu">
        <a href="#">Cars</a>
        <a href="#">Bikes</a>
        <a href="#">Nature</a>
      </div>
    </li>

    <li class="dropdown">
      <a href="#">Events</a>
      <div class="dropdown-menu">
        <a href="events-running.html">Running</a>
        <a href="events-cars.html">Cars</a>
      </div>
    </li>

    <li class="dropdown">
      <a href="#">Training</a>
      <div class="dropdown-menu">
        <a href="training-plans.html">Plans</a>
        <a href="training-tips.html">Tips</a>
        <a href="#">Nutrition</a>
      </div>
    </li>

  </ul>

  <div class="menu-toggle" id="menuBtn">☰</div>
</nav>

<script>

// mobile menu toggle
const menuBtn = document.getElementById("menuBtn");
const navLinks = document.getElementById("navLinks");

menuBtn.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});

// mobile dropdown toggle
document.querySelectorAll(".dropdown").forEach(drop => {
  drop.addEventListener("click", () => {
    if (window.innerWidth <= 768) {
      drop.classList.toggle("active");
    }
  });
});

</script>

</body>
</html>
