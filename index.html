<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finish Line Frames</title>
<style>
/* Basis */
body {
  margin: 0;
  padding-top: 70px;
  background-color: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* Überschrift */
h1 {
  font-size: 60px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #FFFFFF;
  text-align: center;
  margin: 20px 0 10px 0;
  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 1s ease, transform 1s ease;
}

/* Zitat unter H1 */
#quote {
  font-size: 22px;
  font-style: italic;
  text-align: center;
  margin-top: 15px;
  margin-bottom: 30px;
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 1.5s ease, transform 1.5s ease;
}

/* Hintergrundvideo */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0;
  transition: opacity 2s ease;
}

/* Navbar */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  box-sizing: border-box;
}

/* Logo */
.logo {
  font-weight: bold;
  font-size: 20px;
  color: white;
}

/* Menü Links */
.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
  position: relative;
}

/* Dropdown */
.nav-links li {
  position: relative;
}

.nav-links li a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  padding: 5px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: 0.3s;
}

.nav-links li a:hover {
  color: #00ffcc;
}

/* Pfeil */
.nav-links li a .arrow {
  display: inline-block;
  margin-left: 5px;
  transition: transform 0.3s ease;
}

/* Untermenü verstecken */
.nav-links li ul {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: rgba(0,0,0,0.9);
  list-style: none;
  padding: 10px 0;
  min-width: 150px;
  z-index: 1000;
  opacity: 0;
  transform: translateX(-20px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}

/* Untermenü sichtbar beim Hover (Desktop) */
.nav-links li:hover > ul {
  display: block;
  opacity: 1;
  transform: translateX(0);
}

/* Untermenü Links */
.nav-links li ul li a {
  padding: 8px 15px;
  white-space: nowrap;
}

/* Hamburger-Button (Mobile) */
.menu-toggle {
  display: none;
  font-size: 30px;
  cursor: pointer;
  color: white;
  z-index: 1001;
  user-select: none;
}

/* Mobile Anpassung */
@media (max-width: 768px) {
  h1 { font-size: 40px; }
  #quote { font-size: 18px; }

  .menu-toggle { display: block; }

  .nav-links {
    flex-direction: column;
    position: fixed;
    top: 70px;
    right: -100%;
    width: 220px;
    height: calc(100% - 70px);
    background: rgba(0,0,0,0.9);
    padding-top: 20px;
    gap: 15px;
    transition: 0.3s;
    overflow-y: auto;
  }

  .nav-links.active { right: 0; }

  .nav-links li ul {
    position: static;
    display: none;
    background: transparent;
    padding: 0;
    opacity: 1;
    transform: translateX(0);
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .nav-links li.active > ul {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 500px;
  }

  .nav-links li.active > a .arrow {
    transform: rotate(90deg);
  }

  .nav-links li a { padding: 10px 15px; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>

  <ul class="nav-links" id="navLinks">
    <li class="dropdown">
      <a href="#">Home <span class="arrow">▶</span></a>
      <ul>
        <li><a href="#">Welcome</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </li>
    <li class="dropdown">
      <a href="#">Pictures <span class="arrow">▶</span></a>
      <ul>
        <li><a href="#">Cars</a></li>
        <li><a href="#">Bikes</a></li>
        <li><a href="#">Nature</a></li>
      </ul>
    </li>
    <li class="dropdown">
      <a href="#">Events <span class="arrow">▶</span></a>
      <ul>
        <li><a href="events-running.html">Running</a></li>
        <li><a href="events-cars.html">Cars</a></li>
      </ul>
    </li>
    <li class="dropdown">
      <a href="#">Training <span class="arrow">▶</span></a>
      <ul>
        <li><a href="#">Plans</a></li>
        <li><a href="#">Tips</a></li>
        <li><a href="#">Nutrition</a></li>
      </ul>
    </li>
  </ul>

  <div class="menu-toggle" id="menuBtn">☰</div>
</nav>

<!-- Überschrift -->
<h1 id="mainTitle">Finish Line Frames</h1>

<!-- Zitat -->
<p id="quote"></p>

<!-- Hintergrundvideo -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="sport.mp4" type="video/mp4">
</video>

<script>
  // Zitate
  const quotes = [
    "The first step is always the hardest.",
    "You don’t have to be fast, you just have to start.",
    "Run when you can, walk if you have to, never quit.",
    "Every mile brings you closer to yourself.",
    "Pain is temporary. Pride is forever.",
    "Discipline beats motivation.",
    "Run your own race.",
    "No excuses. Just run.",
    "Sweat now, shine later.",
    "Your only limit is you."
  ];

  const today = new Date().getDate();
  const index = today % quotes.length;
  const quoteElement = document.getElementById("quote");
  quoteElement.innerText = quotes[index];

  // Fade-In Animation
  window.addEventListener('load', () => {
    document.getElementById('mainTitle').style.opacity = '1';
    document.getElementById('mainTitle').style.transform = 'translateY(0)';
    quoteElement.style.opacity = '1';
    quoteElement.style.transform = 'translateY(0)';
    document.getElementById('bg-video').style.opacity = '1';
  });

  // Mobile Menü Toggle
  const menuBtn = document.getElementById("menuBtn");
  const navLinks = document.getElementById("navLinks");
  menuBtn.addEventListener("click", () => navLinks.classList.toggle("active"));

  // Mobile Dropdown Toggle + Pfeil + SlideDown
  const dropdowns = document.querySelectorAll('.nav-links .dropdown');
  dropdowns.forEach(drop => {
    drop.addEventListener('click', (e) => {
      if (window.innerWidth <= 768) {
        e.stopPropagation();
        const subMenu = drop.querySelector('ul');
        drop.classList.toggle('active');
        if (drop.classList.contains('active')) {
          subMenu.style.maxHeight = subMenu.scrollHeight + "px";
        } else {
          subMenu.style.maxHeight = "0";
        }
      }
    });
  });
</script>

</body>
</html>
