<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finish Line Frames</title>
<style>
/* Basis */
body {
  margin: 0;
  padding-top: 70px; /* Platz für feste Menüleiste */
  background-color: black;
  color: white;
  font-family: Arial, sans-serif;
}

/* Überschrift */
h1 {
  font-size: 60px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #FFFFFF;
  text-align: center;
  margin: 20px 0 10px 0;
}

/* Zitat direkt unter H1 */
#quote {
  font-size: 22px;
  font-style: italic;
  text-align: center;
  margin-top: 15px;
  margin-bottom: 30px;
}

/* Hintergrundvideo */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* Navbar - horizontale Leiste */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-sizing: border-box;
  z-index: 1000;
}

/* Logo */
.logo {
  font-weight: bold;
  font-size: 20px;
  color: white;
}

/* Menü Links horizontal */
.nav-links {
  list-style: none;
  display: flex;
  gap: 20px; /* Abstand zwischen Links */
  margin: 0;
  padding-right: 20px; /* letztes Element sichtbar */
  box-sizing: border-box;
}

.nav-links li a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  transition: 0.3s;
}

.nav-links li a:hover {
  color: #00ffcc;
}

/* Mobile-Anpassung */
@media (max-width: 768px) {
  h1 {
    font-size: 40px;
  }

  #quote {
    font-size: 18px;
  }

  .nav-links {
    flex-direction: column;
    gap: 15px;
    background: rgba(0,0,0,0.9);
    position: fixed;
    top: 70px;
    right: -100%;
    width: 200px;
    height: calc(100% - 70px);
    padding-top: 20px;
    padding-right: 0;
    transition: 0.3s;
  }

  .nav-links.active {
    right: 0;
  }

  .nav-links li {
    margin: 20px 0;
    text-align: center;
  }

  /* Hamburger-Button */
  .menu-toggle {
    display: block;
    font-size: 30px;
    cursor: pointer;
    color: white;
  }
}

/* Desktop: kein Hamburger */
.menu-toggle {
  display: none;
}
</style>
</head>
<body>

<!-- Horizontale Menüleiste -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>
  <ul class="nav-links" id="navLinks">
    <li><a href="#">Home</a></li>
    <li><a href="#">Quotes</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
  <div class="menu-toggle" id="menuBtn">☰</div> <!-- nur sichtbar auf Mobile -->
</nav>

<!-- Überschrift -->
<h1>Finish Line Frames</h1>

<!-- Zitat direkt unter H1 -->
<p id="quote"></p>

<!-- Hintergrundvideo -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="sport.mp4" type="video/mp4">
</video>

<!-- JavaScript -->
<script>
  // Liste englischer Lauf-Zitate
  const quotes = [
    "The first step is always the hardest.",
    "You don’t have to be fast, you just have to start.",
    "Run when you can, walk if you have to, never quit.",
    "Every mile brings you closer to yourself.",
    "Pain is temporary. Pride is forever.",
    "Discipline beats motivation.",
    "Run your own race.",
    "No excuses. Just run.",
    "Sweat now, shine later.",
    "Your only limit is you."
  ];

  // Tägliches Zitat berechnen
  const today = new Date().getDate();
  const index = today % quotes.length;
  document.getElementById("quote").innerText = quotes[index];

  // Mobile-Menü Funktion
  const menuBtn = document.getElementById("menuBtn");
  const navLinks = document.getElementById("navLinks");

  menuBtn.addEventListener("click", () => {
    navLinks.classList.toggle("active");
  });
</script>

</body>
</html>
