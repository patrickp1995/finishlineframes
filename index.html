<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finish Line Frames</title>
<meta name="description" content="Trainingspläne,Fotografie,Laufen, Motivation,Events,Finishlineframes, Finish Line Frames .">  

<style>
body {
  margin: 0;
  padding-top: 70px;
  background-color: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

  /* AUDIO */
<audio id="bg-music" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('bg-music').play()">
  Musik starten
</button>
  
/* HERO */
h1 {
  font-size: 60px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  text-align: center;
  margin: 20px 0 10px 0;
  opacity: 0;
  transform: translateY(-20px);
  transition: 1s ease;
}

#quote {
  font-size: 22px;
  font-style: italic;
  text-align: center;
  margin-top: 15px;
  margin-bottom: 30px;
  opacity: 0;
  transform: translateY(-10px);
  transition: 1.5s ease;
}

/* VIDEO */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0;
  transition: 2s ease;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  box-sizing: border-box;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

/* LINKS */
.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

.nav-links li {
  position: relative;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  padding: 5px 10px;
  display: block;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #00ffcc;
}

/* DROPDOWN */
.nav-links li ul {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: rgba(0,0,0,0.9);
  list-style: none;
  padding: 10px 0;
  min-width: 150px;
}

.nav-links li:hover ul {
  display: block;
}

.nav-links li ul li a {
  padding: 8px 15px;
  white-space: nowrap;
}

/* MOBILE */
.menu-toggle {
  display: none;
  font-size: 30px;
  cursor: pointer;
}

@media (max-width: 768px) {

  h1 { font-size: 40px; }
  #quote { font-size: 18px; }

  .menu-toggle { display: block; }

  .nav-links {
    position: fixed;
    top: 70px;
    right: -100%;
    width: 220px;
    height: calc(100% - 70px);
    background: rgba(0,0,0,0.9);
    flex-direction: column;
    padding-top: 20px;
    transition: 0.3s;
  }

  .nav-links.active {
    right: 0;
  }

  .nav-links li ul {
    position: static;
    display: none;
    background: transparent;
  }

  .nav-links li.active ul {
    display: block;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>

  <ul class="nav-links" id="navLinks">

    <li>
      <a href="#">Home</a>
      <ul>
        <li><a href="index.html">Welcome</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Pictures</a>
      <ul>
        <li><a href="#">Cars</a></li>
        <li><a href="#">Bikes</a></li>
        <li><a href="#">Nature</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Events</a>
      <ul>
        <li><a href="events-running.html">Running</a></li>
        <li><a href="events-cars.html">Cars</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Training</a>
      <ul>
        <li><a href="training-plans.html">Plans</a></li>
        <li><a href="training-tips.html">Tips</a></li>
        <li><a href="#">Nutrition</a></li>
      </ul>
    </li>

  </ul>

  <div class="menu-toggle" id="menuBtn">☰</div>
</nav>

<!-- CONTENT -->
<h1 id="mainTitle">Finish Line Frames</h1>
<p id="quote"></p>

<video autoplay muted loop playsinline id="bg-video">
  <source src="sport.mp4" type="video/mp4">
</video>

<script>

// quotes
const quotes = [
  "The first step is always the hardest.",
  "You don’t have to be fast, you just have to start.",
  "Run when you can, walk if you have to, never quit.",
  "Every mile brings you closer to yourself.",
  "Pain is temporary. Pride is forever.",
  "Discipline beats motivation.",
  "Run your own race.",
  "No excuses. Just run.",
  "Sweat now, shine later.",
  "Your only limit is you."
];

const index = new Date().getDate() % quotes.length;
document.getElementById("quote").innerText = quotes[index];

// fade in
window.addEventListener("load", () => {
  document.getElementById("mainTitle").style.opacity = "1";
  document.getElementById("mainTitle").style.transform = "translateY(0)";
  document.getElementById("quote").style.opacity = "1";
  document.getElementById("quote").style.transform = "translateY(0)";
  document.getElementById("bg-video").style.opacity = "1";
});

// mobile menu
const menuBtn = document.getElementById("menuBtn");
const navLinks = document.getElementById("navLinks");

menuBtn.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});

// mobile dropdown
document.querySelectorAll(".nav-links > li").forEach(li => {
  li.addEventListener("click", () => {
    if (window.innerWidth <= 768) {
      li.classList.toggle("active");
    }
  });
});

</script>

</body>
</html>
