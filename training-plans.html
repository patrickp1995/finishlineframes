<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Plans | Finish Line Frames</title>

<style>
/* Basis */
body {
  margin: 0;
  padding-top: 70px;
  background-color: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* Überschrift */
h1 {
  font-size: 50px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  margin: 20px 0 10px 0;
  opacity: 0;
  transform: translateY(-20px);
  transition: 1s;
}

/* Bereich */
#plans {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

/* Karten */
.plan-card {
  background: rgba(0,0,0,0.7);
  border: 1px solid #00ffcc;
  border-radius: 8px;
  padding: 15px 20px;
  transition: 0.3s;
}

.plan-card:hover {
  transform: scale(1.02);
}

/* Navbar (gleich wie deine anderen Seiten!) */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

/* Menü */
.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
}

.nav-links li {
  position: relative;
}

.nav-links a {
  color: white;
  text-decoration: none;
  display: flex;
  align-items: center;
}

/* Pfeil */
.arrow {
  margin-left: 5px;
}

/* Dropdown */
.nav-links li ul {
  display: none;
  position: absolute;
  background: rgba(0,0,0,0.9);
  padding: 10px 0;
  list-style: none;
  min-width: 150px;
}

.nav-links li:hover ul {
  display: block;
}

.nav-links li ul li a {
  padding: 8px 15px;
}

/* Mobile */
.menu-toggle {
  display: none;
  font-size: 30px;
  cursor: pointer;
}

@media (max-width:768px){
  .menu-toggle { display:block; }

  .nav-links {
    flex-direction: column;
    position: fixed;
    right: -100%;
    top: 70px;
    width: 220px;
    height: 100%;
    background: rgba(0,0,0,0.9);
    padding-top: 20px;
    transition: 0.3s;
  }

  .nav-links.active {
    right: 0;
  }
}

/* Video */
#bg-video {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0;
  transition:2s;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>

  <ul class="nav-links" id="navLinks">
    <li class="dropdown">
      <a href="index.html">Home <span class="arrow">▶</span></a>
      <ul>
        <li><a href="#">Welcome</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </li>

    <li class="dropdown">
      <a href="#">Pictures <span class="arrow">▶</span></a>
      <ul>
        <li><a href="#">Cars</a></li>
        <li><a href="#">Bikes</a></li>
        <li><a href="#">Nature</a></li>
      </ul>
    </li>

    <li class="dropdown">
      <a href="#">Events <span class="arrow">▶</span></a>
      <ul>
        <li><a href="events-running.html">Running</a></li>
        <li><a href="events-cars.html">Cars</a></li>
      </ul>
    </li>

    <li class="dropdown">
      <a href="#">Training <span class="arrow">▶</span></a>
      <ul>
        <li><a href="training-plans.html">Plans</a></li>
        <li><a href="#">Tips</a></li>
        <li><a href="#">Nutrition</a></li>
      </ul>
    </li>
  </ul>

  <div class="menu-toggle" id="menuBtn">☰</div>
</nav>

<!-- Titel -->
<h1 id="title">Training Plans</h1>

<!-- Inhalte -->
<div id="plans"></div>

<!-- Video -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="sport.mp4" type="video/mp4">
</video>

<script>
// HIER DEINE TRAININGSPLÄNE EINTRAGEN
const plans = [
  {
    name: "Beginner 5K Plan",
    description: "Start running from zero and reach your first 5K."
  },
  {
    name: "10K Performance Plan",
    description: "Improve endurance and speed for your next race."
  },
  {
    name: "Half Marathon Plan",
    description: "Structured weekly plan to finish strong."
  }
];

// Anzeigen
const container = document.getElementById("plans");

plans.forEach(plan => {
  const card = document.createElement("div");
  card.className = "plan-card";
  card.innerHTML = `
    <h3>${plan.name}</h3>
    <p>${plan.description}</p>
  `;
  container.appendChild(card);
});

// Animation
window.onload = () => {
  document.getElementById("title").style.opacity = "1";
  document.getElementById("title").style.transform = "translateY(0)";
  container.style.opacity = "1";
  container.style.transform = "translateY(0)";
  document.getElementById("bg-video").style.opacity = "1";
};

// Mobile Menü
document.getElementById("menuBtn").onclick = () => {
  document.getElementById("navLinks").classList.toggle("active");
};
</script>

</body>
</html>
