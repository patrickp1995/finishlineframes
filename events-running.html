<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events - Running | Finish Line Frames</title>
<style>
/* Basis */
body {
  margin: 0;
  padding-top: 70px;
  background-color: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* Überschrift */
h1 {
  font-size: 50px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #FFFFFF;
  text-align: center;
  margin: 20px 0 10px 0;
  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 1s ease, transform 1s ease;
}

/* Events Bereich */
#events {
  max-width: 1000px;
  margin: 0 auto 50px auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 1s ease, transform 1s ease;
}

.event-card {
  background: rgba(0,0,0,0.7);
  padding: 15px 20px;
  border-radius: 8px;
  border: 1px solid #00ffcc;
  transition: transform 0.3s;
}

.event-card:hover {
  transform: scale(1.02);
}

.event-card h3 {
  margin: 0 0 5px 0;
}

.event-card p {
  margin: 0;
}

/* Navbar */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  box-sizing: border-box;
}

.logo {
  font-weight: bold;
  font-size: 20px;
  color: white;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
  position: relative;
}

.nav-links li {
  position: relative;
}

.nav-links li a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  padding: 5px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-links li a .arrow {
  display: inline-block;
  margin-left: 5px;
  transition: transform 0.3s ease;
}

/* Dropdown Untermenü */
.nav-links li ul {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: rgba(0,0,0,0.9);
  list-style: none;
  padding: 10px 0;
  min-width: 150px;
  z-index: 1000;
  opacity: 0;
  transform: translateX(-20px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.nav-links li:hover > ul {
  display: block;
  opacity: 1;
  transform: translateX(0);
}

.nav-links li ul li a {
  padding: 8px 15px;
  white-space: nowrap;
}

/* Hamburger Button */
.menu-toggle {
  display: none;
  font-size: 30px;
  cursor: pointer;
  z-index: 1001;
  color: white;
  user-select: none;
}

/* Mobile */
@media (max-width: 768px) {
  h1 { font-size: 40px; }

  .menu-toggle { display: block; }

  .nav-links {
    flex-direction: column;
    position: fixed;
    top: 70px;
    right: -100%;
    width: 220px;
    height: calc(100% - 70px);
    background: rgba(0,0,0,0.9);
    padding-top: 20px;
    gap: 15px;
    transition: 0.3s;
    overflow-y: auto;
  }

  .nav-links.active { right: 0; }

  .nav-links li ul {
    position: static;
    display: none;
    background: transparent;
    padding: 0;
    opacity: 1;
    transform: translateX(0);
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .nav-links li.active > ul {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 500px;
  }

  .nav-links li.active > a .arrow {
    transform: rotate(90deg);
  }

  .nav-links li a { padding: 10px 15px; }
}

/* Hintergrundvideo */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0;
  transition: opacity 2s ease;
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>

  <ul class="nav-links" id="navLinks">
    <li class="dropdown">
      <a href="index.html">Home <span class="arrow">▶</span></a>
    </li>
    <li class="dropdown">
      <a href="#">Pictures <span class="arrow">▶</span></a>
      <ul>
        <li><a href="#">Cars</a></li>
        <li><a href="#">Bikes</a></li>
        <li><a href="#">Nature</a></li>
      </ul>
    </li>
    <li class="dropdown">
      <a href="#">Events <span class="arrow">▶</span></a>
      <ul>
        <li><a href="events-running.html">Running</a></li>
        <li><a href="events-cars.html">Cars</a></li> <!-- Verweis auf Car Events -->
      </ul>
    </li>
    <li class="dropdown">
      <a href="#">Training <span class="arrow">▶</span></a>
      <ul>
        <li><a href="training.plans.html">Plans</a></li>
        <li><a href="#">Tips</a></li>
        <li><a href="#">Nutrition</a></li>
      </ul>
    </li>
  </ul>

  <div class="menu-toggle" id="menuBtn">☰</div>
</nav>

<!-- Überschrift -->
<h1 id="mainTitle">Running Events</h1>

<!-- Events Bereich -->
<div id="events"></div>

<!-- Hintergrundvideo -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="sport.mp4" type="video/mp4">
</video>

<script>
  // Running Events eintragen
  const runningEvents = [
    { name: "Linz Marathon 2026", date: "Sonntag, 12. April", description: "A challenging marathon in Linz." },
    { name: "Salzburg Marathon: Running Festival of the City of Mozart", date: "Sonntag, 17. Mai", description: "The PUMA Salzburg Marathon takes place from May 15, 2026 - May 17, 2026, featuring a 5km, 10km, Half Marathon & More." },
    { name: "Wörthersee Marathon - Ein See. Ein Tag. Dein Marathon.", date: "27. September 2026", description: "„Run the Lake“!" }
  ];

  const eventsContainer = document.getElementById("events");

  runningEvents.forEach(event => {
    const card = document.createElement("div");
    card.className = "event-card";
    card.innerHTML = `
      <h3>${event.name}</h3>
      <p><strong>Date:</strong> ${event.date}</p>
      <p>${event.description}</p>
    `;
    eventsContainer.appendChild(card);
  });

  // Fade-In Animation
  window.addEventListener('load', () => {
    document.getElementById('mainTitle').style.opacity = '1';
    document.getElementById('mainTitle').style.transform = 'translateY(0)';
    eventsContainer.style.opacity = '1';
    eventsContainer.style.transform = 'translateY(0)';
    document.getElementById('bg-video').style.opacity = '1';
  });

  // Mobile Menü Toggle
  const menuBtn = document.getElementById("menuBtn");
  const navLinks = document.getElementById("navLinks");
  menuBtn.addEventListener("click", () => navLinks.classList.toggle("active"));

  // Mobile Dropdown Toggle
  const dropdowns = document.querySelectorAll('.nav-links .dropdown');
  dropdowns.forEach(drop => {
    drop.addEventListener('click', (e) => {
      if (window.innerWidth <= 768) {
        e.stopPropagation();
        const subMenu = drop.querySelector('ul');
        drop.classList.toggle('active');
        if (drop.classList.contains('active')) {
          subMenu.style.maxHeight = subMenu.scrollHeight + "px";
        } else {
          subMenu.style.maxHeight = "0";
        }
      }
    });
  });
</script>
</body>
</html>
