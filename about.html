<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About - Finish Line Frames</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background-color: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* ================= NAVBAR (wie index.html) ================= */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  box-sizing: border-box;
}

.logo {
  font-weight: bold;
  font-size: 20px;
  color: white;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

.nav-links li {
  position: relative;
}

.nav-links li a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  padding: 5px 10px;
  display: flex;
  align-items: center;
  transition: 0.3s;
}

.nav-links li a:hover {
  color: #00ffcc;
}

.nav-links li ul {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: rgba(0,0,0,0.9);
  list-style: none;
  padding: 10px 0;
  min-width: 150px;
}

.nav-links li:hover ul {
  display: block;
}

.nav-links li ul li a {
  padding: 8px 15px;
  white-space: nowrap;
}

/* Mobile */
.menu-toggle {
  display: none;
  font-size: 30px;
  cursor: pointer;
  color: white;
}

@media (max-width: 768px) {
  .menu-toggle { display: block; }

  .nav-links {
    position: fixed;
    top: 70px;
    right: -100%;
    flex-direction: column;
    width: 220px;
    height: calc(100% - 70px);
    background: rgba(0,0,0,0.9);
    padding-top: 20px;
    transition: 0.3s;
  }

  .nav-links.active {
    right: 0;
  }

  .nav-links li ul {
    position: static;
    display: none;
    background: transparent;
  }

  .nav-links li.active ul {
    display: block;
  }
}

/* ================= HERO ================= */
.hero {
  height: calc(100vh - 70px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.hero h1 {
  font-size: 70px;
  letter-spacing: 5px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.hero p {
  font-size: 20px;
  max-width: 600px;
  color: #aaa;
  opacity: 0;
  transform: translateY(20px);
  transition: 1.2s ease;
}
</style>
</head>

<body>

<!-- NAVBAR (wie index.html) -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>

  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>

    <li>
      <a href="#">Pictures</a>
      <ul>
        <li><a href="#">Cars</a></li>
        <li><a href="#">Bikes</a></li>
        <li><a href="#">Nature</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Events</a>
      <ul>
        <li><a href="events-running.html">Running</a></li>
        <li><a href="events-cars.html">Cars</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Training</a>
      <ul>
        <li><a href="training-plans.html">Plans</a></li>
        <li><a href="training-tips.html">Tips</a></li>
      </ul>
    </li>
  </ul>

  <div class="menu-toggle" id="menuBtn">☰</div>
</nav>

<!-- HERO (nur das bleibt!) -->
<div class="hero">
  <h1 id="title">ABOUT US</h1>
  <p id="subtitle">
    We capture motion, endurance, and the mindset of athletes who never quit.
  </p>
</div>

<script>

// fade-in animation
window.addEventListener("load", () => {
  document.getElementById("title").style.opacity = "1";
  document.getElementById("title").style.transform = "translateY(0)";

  document.getElementById("subtitle").style.opacity = "1";
  document.getElementById("subtitle").style.transform = "translateY(0)";
});

// mobile menu
const menuBtn = document.getElementById("menuBtn");
const navLinks = document.getElementById("navLinks");

menuBtn.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});

// mobile dropdown
document.querySelectorAll(".nav-links > li").forEach(li => {
  li.addEventListener("click", (e) => {
    if (window.innerWidth <= 768) {
      li.classList.toggle("active");
    }
  });
});

</script>

</body>
</html>
