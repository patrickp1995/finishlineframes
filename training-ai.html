<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI | Finish Line Frames</title>

<style>
/* =======================
   BASIS DESIGN (INDEX STYLE)
======================= */
body {
  margin: 0;
  padding-top: 70px;
  background: #020617;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* Überschrift */
h1 {
  font-size: 50px;
  text-align: center;
  margin: 20px 0;
}

/* =======================
   NAVBAR (1:1 INDEX STYLE)
======================= */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  box-sizing: border-box;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

.nav-links li {
  position: relative;
}

.nav-links a {
  color: white;
  text-decoration: none;
  padding: 5px 10px;
  display: flex;
  align-items: center;
}

.nav-links a:hover {
  color: #22c55e;
}

/* Pfeil */
.arrow {
  margin-left: 5px;
}

/* Dropdown */
.nav-links li ul {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: #0f172a;
  padding: 10px 0;
  min-width: 160px;
  list-style: none;
}

.nav-links li:hover ul {
  display: block;
}

.nav-links li ul li a {
  padding: 8px 12px;
}

/* Mobile Menü */
.menu-toggle {
  display: none;
  font-size: 28px;
  cursor: pointer;
}

@media (max-width:768px) {
  .menu-toggle { display:block; }

  .nav-links {
    position: fixed;
    top: 70px;
    right: -100%;
    flex-direction: column;
    background: #020617;
    width: 220px;
    height: 100%;
    padding: 20px;
    transition: 0.3s;
  }

  .nav-links.active {
    right: 0;
  }

  .nav-links li ul {
    position: static;
  }
}

/* =======================
   AI TRAINING APP
======================= */

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #0f172a;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  background: #020617;
  padding: 8px;
  border-radius: 8px;
  text-align: center;
  font-size: 11px;
  cursor: pointer;
}

.done {
  background: #22c55e !important;
  color: black;
}

.progress {
  background: #333;
  height: 12px;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #38bdf8;
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>

  <ul class="nav-links" id="nav">
    <li><a href="index.html">Home</a></li>

    <li>
      <a href="#">Pictures <span class="arrow">▶</span></a>
      <ul>
        <li><a href="#">Cars</a></li>
        <li><a href="#">Bikes</a></li>
        <li><a href="#">Nature</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Events <span class="arrow">▶</span></a>
      <ul>
        <li><a href="events-running.html">Running</a></li>
        <li><a href="events-cars.html">Cars</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Training <span class="arrow">▶</span></a>
      <ul>
        <li><a href="training-ai.html">Create Plan AI</a></li>
        <li><a href="training-plans.html">Plans</a></li>
        <li><a href="training-tips.html">Tips</a></li>
      </ul>
    </li>
  </ul>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<!-- ================= TITLE ================= -->
<h1>🏃‍♂️ Training AI Coach</h1>

<!-- ================= APP ================= -->
<div class="container">

<div class="card">
  <input id="name" placeholder="Name">
  <input id="km" placeholder="Aktuelle km">
  <button onclick="start()">Start AI Plan</button>
</div>

<div class="card">
  <h3>Status</h3>
  <p id="status"></p>
  <div class="progress"><div class="fill" id="bar"></div></div>
</div>

<div class="card">
  <h3>Woche <span id="w">1</span></h3>
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
  <div class="calendar" id="cal"></div>
</div>

<div class="card">
  <h3>AI Coach</h3>
  <p id="coach"></p>
</div>

</div>

<script>

/* ================= MENU ================= */
function toggleMenu(){
  document.getElementById("nav").classList.toggle("active");
}

/* ================= AI TRAINING ================= */

let plan = [];
let done = [];
let week = 0;

let profile = {
  name: "",
  baseKm: 0,
  fitness: 50,
  streak: 0
};

function start() {
  profile.name = document.getElementById("name").value;
  profile.baseKm = parseFloat(document.getElementById("km").value);

  generate();
  render();
}

function generate() {

  plan = [];
  done = [];

  let km = profile.baseKm;

  for (let w = 0; w < 8; w++) {

    let weekPlan = [
      "Easy " + km + " km",
      "Intervals",
      "Rest",
      "Tempo",
      "Rest",
      "Long " + (km + 2) + " km",
      "Recovery"
    ];

    plan.push(weekPlan);
    done.push(new Array(7).fill(false));

    km += 1;
  }
}

function render() {

  let html = "";

  for (let i = 0; i < 7; i++) {
    html += `
      <div class="day ${done[week][i] ? "done" : ""}" onclick="toggle(${i})">
        ${plan[week][i]}
      </div>
    `;
  }

  document.getElementById("cal").innerHTML = html;
  document.getElementById("w").innerText = week + 1;

  update();
}

function toggle(i){
  done[week][i] = !done[week][i];
  render();
}

function update(){

  let count = done[week].filter(x => x).length;
  let percent = Math.round((count / 7) * 100);

  document.getElementById("bar").style.width = percent + "%";

  document.getElementById("status").innerText =
    profile.name + " | Fitness " + profile.fitness;

  let msg = "";

  if(profile.fitness > 75){
    msg = "🔥 Strong form";
  } else if(profile.fitness < 40){
    msg = "⚠️ Build base";
  } else {
    msg = "👍 Stable progress";
  }

  document.getElementById("coach").innerText = msg;
}

function next(){
  if(week < 7) { week++; render(); }
}

function prev(){
  if(week > 0) { week--; render(); }
}

</script>

</body>
</html>
