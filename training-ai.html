<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI Pro | Finish Line Frames</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background: #020617;
  color: white;
  font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  box-sizing: border-box;
}

.logo {
  font-weight: bold;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

.nav-links li { position: relative; }

.nav-links a {
  color: white;
  text-decoration: none;
}

.nav-links li ul {
  display: none;
  position: absolute;
  top: 100%;
  background: #0f172a;
  padding: 10px;
  min-width: 160px;
}

.nav-links li:hover ul {
  display: block;
}

.menu-toggle {
  display: none;
  font-size: 28px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  .menu-toggle{display:block;}
  .nav-links{
    position: fixed;
    top: 70px;
    right: -100%;
    flex-direction: column;
    background: #020617;
    width: 220px;
    height: 100%;
    padding: 20px;
    transition: 0.3s;
  }
  .nav-links.active{right:0;}
  .nav-links li ul{position: static;}
}

/* CONTENT */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

select, input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  font-weight: bold;
}

/* CALENDAR */
.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  margin-bottom: 5px;
  font-size: 12px;
  opacity: 0.7;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  background: #020617;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  font-size: 11px;
  cursor: pointer;
}

.done {
  background: #22c55e;
  color: black;
}

.progress {
  height: 12px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: #38bdf8;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>

  <ul class="nav-links" id="nav">
    <li><a href="index.html">Home</a></li>
    <li><a href="#">Pictures</a></li>
    <li><a href="events-running.html">Events</a></li>
    <li><a href="#">Training</a></li>
  </ul>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<!-- CONTENT -->
<div class="container">

<h2>🤖 Training AI Pro</h2>

<div class="card">
  <select id="goal">
    <option value="5">5K Anfänger</option>
    <option value="10">10K Aufbau</option>
    <option value="21">Halbmarathon</option>
  </select>

  <input id="name" placeholder="Name">
  <input id="km" placeholder="Aktuelle km">
  <button onclick="generate()">AI Plan erstellen</button>
</div>

<div class="card">
  <h3>📅 Woche <span id="week">1</span></h3>

  <div class="weekdays">
    <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
  </div>

  <div class="calendar" id="cal"></div>
</div>

<div class="card">
  <h3>📊 Fortschritt</h3>
  <div class="progress"><div class="bar" id="bar"></div></div>
</div>

</div>

<script>

let plan = [];
let done = [];
let week = 0;

function toggleMenu(){
  document.getElementById("nav").classList.toggle("active");
}

function generate(){

  let km = parseInt(document.getElementById("km").value);

  plan = [];
  done = [];

  for(let w=0; w<5; w++){

    let weekPlan = [
      "Easy " + km + " km",
      "Intervalle",
      "Pause",
      "Tempo",
      "Pause",
      "Long " + (km+2) + " km",
      "Recovery"
    ];

    plan.push(weekPlan);
    done.push(new Array(7).fill(false));

    km += 1;
  }

  save();
  render();
}

function render(){

  let html = "";

  for(let i=0;i<7;i++){
    html += `
      <div class="day ${done[week][i] ? "done" : ""}"
      onclick="toggle(${i})">
      ${plan[week][i]}
      </div>
    `;
  }

  document.getElementById("cal").innerHTML = html;
  document.getElementById("week").innerText = week+1;

  update();
}

function toggle(i){
  done[week][i] = !done[week][i];
  save();
  render();
}

function update(){

  let count = done[week].filter(x=>x).length;
  let percent = (count/7)*100;

  document.getElementById("bar").style.width = percent + "%";
}

function save(){
  localStorage.setItem("planAI", JSON.stringify(plan));
  localStorage.setItem("doneAI", JSON.stringify(done));
}

function load(){
  let p = JSON.parse(localStorage.getItem("planAI"));
  let d = JSON.parse(localStorage.getItem("doneAI"));

  if(p && d){
    plan = p;
    done = d;
    render();
  }
}

load();

</script>

</body>
</html>
