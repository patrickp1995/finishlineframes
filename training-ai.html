<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI Pro | Multi Week Coach</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background: black;
  color: white;
  font-family: Arial;
}

/* NAV */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.85);
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

/* CONTAINER */
.container {
  max-width: 950px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
}

/* CARD */
.card {
  background: rgba(20,20,20,0.9);
  border: 1px solid #00ffcc;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00ffcc;
  font-weight: bold;
}

/* WEEK BOX */
.week {
  margin-bottom: 20px;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.03);
}

.week-title {
  font-size: 18px;
  margin-bottom: 10px;
  color: #00ffcc;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: #111;
  padding: 10px;
  border-radius: 8px;
  font-size: 11px;
  text-align: center;
  cursor: pointer;
}

.day:hover {
  border: 1px solid #00ffcc;
}

/* DETAILS */
#details {
  margin-top: 10px;
  background: rgba(0,255,204,0.08);
  padding: 10px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="navbar">
  <div>🏃 AI Coach Pro</div>
  <div>
    <a href="index.html" style="color:white">Home</a>
  </div>
</div>

<div class="container">

<h1>🧠 Multi Week AI Coach</h1>

<div class="card">
<h3>📊 Eingabe</h3>
<input id="km" placeholder="Wöchentliche km (z.B. 40)">
<input id="weeks" placeholder="Anzahl Wochen (z.B. 6)">
<button onclick="generate()">Plan erstellen</button>
</div>

<div id="output"></div>

<div class="card">
<h3>📊 Details</h3>
<div id="details"></div>
</div>

</div>

<script>

let plan = [];

function generate() {

  let weeklyKm = parseFloat(document.getElementById("km").value);
  let weeks = parseInt(document.getElementById("weeks").value);

  plan = [];

  for (let w = 0; w < weeks; w++) {

    let km = weeklyKm + (w * 2); // progression

    plan.push([
      create("Easy Run", km * 0.20),
      create("Intervalle", km * 0.15),
      create("Recovery", km * 0.10),
      create("Tempo Run", km * 0.20),
      create("Ruhetag", 0),
      create("Long Run", km * 0.30),
      create("Easy Run", km * 0.05)
    ]);
  }

  render();
}

function create(type, km) {

  let pace =
    type === "Intervalle" ? rand(4.0, 4.5) :
    type === "Tempo Run" ? rand(4.5, 5.2) :
    type === "Long Run" ? rand(5.3, 6.3) :
    type === "Recovery" ? rand(6.2, 7.5) :
    type === "Easy Run" ? rand(5.5, 6.5) :
    0;

  let hr =
    type === "Intervalle" ? randInt(165,185) :
    type === "Tempo Run" ? randInt(155,170) :
    type === "Long Run" ? randInt(145,160) :
    type === "Recovery" ? randInt(120,140) :
    0;

  return { type, km: km.toFixed(1), pace, hr };
}

function render() {

  let out = "";

  plan.forEach((week, wIndex)=>{

    out += `<div class="week">
      <div class="week-title">📅 Woche ${wIndex+1}</div>
      <div class="grid">`;

    week.forEach((d,i)=>{
      out += `
        <div class="day" onclick="show(${wIndex},${i})">
          ${d.type}<br>${d.km} km
        </div>
      `;
    });

    out += `</div></div>`;
  });

  document.getElementById("output").innerHTML = out;
}

function show(w,i){

  let d = plan[w][i];

  let mapLink = "";

  if(d.type !== "Ruhetag"){
    mapLink = `
      <br><br>
      <a target="_blank"
      href="https://www.google.com/maps/dir/?api=1&origin=Vienna&destination=Vienna&travelmode=walking">
      🗺 Route in Google Maps öffnen
      </a>
    `;
  }

  document.getElementById("details").style.display = "block";
  document.getElementById("details").innerHTML = `
    <b>${d.type}</b><br><br>
    🏃 km: ${d.km}<br>
    ⚡ Pace: ${d.pace || "-"}<br>
    ❤️ HF: ${d.hr || "-"}
    ${mapLink}
  `;
}

function rand(min,max){
  return (Math.random()*(max-min)+min).toFixed(2);
}

function randInt(min,max){
  return Math.floor(Math.random()*(max-min)+min);
}

</script>

</body>
</html>
