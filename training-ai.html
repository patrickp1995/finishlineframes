<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI Garmin Pro</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

/* NAV */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #0f172a;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  z-index: 1000;
}

.logo {
  font-weight: bold;
  color: #22c55e;
}

.nav-links {
  display: flex;
  gap: 15px;
  list-style: none;
}

.nav-links a {
  color: white;
  text-decoration: none;
}

.menu-toggle {
  display: none;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 15px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
}

/* INPUT */
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  font-weight: bold;
}

/* CALENDAR */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  background: #0b0f1a;
  padding: 8px;
  font-size: 11px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}

.done {
  background: #22c55e;
  color: black;
}

/* PROGRESS */
.track {
  background: #222;
  height: 10px;
  border-radius: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
}

/* CHART */
.chart {
  display: flex;
  align-items: flex-end;
  height: 120px;
  gap: 5px;
}

.c {
  flex: 1;
  background: #22c55e;
  border-radius: 5px;
}

/* MOBILE */
@media(max-width:900px){
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">🏃 Training AI Pro</div>
  <div class="menu-toggle">☰</div>
</div>

<div class="container">

<!-- ================= AI TRAINING ================= -->
<div class="card">
  <h2>🤖 AI Coach</h2>

  <select id="goal">
    <option value="5">5K</option>
    <option value="10">10K</option>
    <option value="21">Half Marathon</option>
  </select>

  <input id="km" placeholder="Aktuelle km">
  <button onclick="generate()">Plan erstellen</button>
</div>

<div class="card">
  <h3>📅 Woche <span id="w">1</span></h3>
  <div class="calendar" id="cal"></div>
</div>

<!-- ================= GARMIN DASHBOARD ================= -->
<div class="grid">

  <div class="card">
    <h3>Weekly Distance</h3>
    <h1 id="dist">0 km</h1>
  </div>

  <div class="card">
    <h3>Fitness Score</h3>
    <h1 id="fit">50</h1>
  </div>

  <div class="card">
    <h3>Progress</h3>
    <div class="track"><div class="bar" id="bar"></div></div>
  </div>

</div>

<div class="card" style="margin-top:15px;">
  <h3>📊 Last 7 Days</h3>
  <div class="chart">
    <div class="c" style="height:30%"></div>
    <div class="c" style="height:60%"></div>
    <div class="c" style="height:40%"></div>
    <div class="c" style="height:80%"></div>
    <div class="c" style="height:55%"></div>
    <div class="c" style="height:90%"></div>
    <div class="c" style="height:70%"></div>
  </div>
</div>

</div>

<script>

let plan = [];
let done = [];
let week = 0;

let fitness = 50;

function generate(){

  let km = parseFloat(document.getElementById("km").value);

  plan = [];
  done = [];

  for(let w=0; w<6; w++){

    let weekPlan = [
      "Easy " + km + " km",
      "Intervals",
      "Rest",
      "Tempo",
      "Rest",
      "Long " + (km+2) + " km",
      "Recovery"
    ];

    plan.push(weekPlan);
    done.push(new Array(7).fill(false));

    km += 1;
  }

  render();
}

function render(){

  let html = "";

  for(let i=0;i<7;i++){
    html += `
      <div class="day ${done[week][i] ? "done" : ""}"
      onclick="toggle(${i})">
        ${plan[week][i]}
      </div>
    `;
  }

  document.getElementById("cal").innerHTML = html;
  document.getElementById("w").innerText = week+1;

  update();
}

function toggle(i){
  done[week][i] = !done[week][i];

  if(done[week][i]) fitness += 2;
  else fitness -= 1;

  render();
}

function update(){

  let count = done[week].filter(x=>x).length;
  let percent = (count/7)*100;

  document.getElementById("bar").style.width = percent + "%";

  document.getElementById("fit").innerText = fitness;

  document.getElementById("dist").innerText =
    (Math.random()*30 + 20).toFixed(1) + " km";
}

</script>

</body>
</html>
