<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Lauf App V7</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: #0f172a;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  font-weight: bold;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  background: #020617;
  padding: 8px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  font-size: 11px;
}

.done {
  background: #22c55e !important;
  color: black;
}

.progress {
  background: #333;
  height: 12px;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: #38bdf8;
  width: 0%;
}
</style>
</head>

<body>

<div class="container">

<h2>🏃‍♂️ Lauf App V7 – Elite Coach</h2>

<div class="card">
<input id="name" placeholder="Name">
<input id="km" placeholder="Aktuelle km">
<button onclick="start()">Start</button>
</div>

<div class="card">
<h3>📊 Status</h3>
<p id="status"></p>
<div class="progress"><div class="fill" id="bar"></div></div>
</div>

<div class="card">
<h3>📅 Woche <span id="w">1</span></h3>
<button onclick="prev()">⬅️</button>
<button onclick="next()">➡️</button>
<div class="calendar" id="cal"></div>
</div>

<div class="card">
<h3>🏆 Coach Analyse</h3>
<p id="coach"></p>
</div>

</div>

<script>

let plan = [];
let done = [];
let week = 0;
let profile = {
  name: "",
  baseKm: 0,
  fitness: 50,
  streak: 0
};

function start() {

  profile.name = document.getElementById("name").value;
  profile.baseKm = parseFloat(document.getElementById("km").value);

  generatePlan();
  render();
}

function generatePlan() {

  plan = [];
  done = [];

  let km = profile.baseKm;

  for (let w = 0; w < 8; w++) {

    let fatigue = analyzeFatigue(w);

    if (fatigue === "overload") km -= 0.5;
    if (fatigue === "fresh") km += 1;

    let weekPlan = [
      "Locker " + km + " km",
      "Intervalle",
      "Pause",
      "Tempo",
      "Pause",
      "Long " + (km + 2) + " km",
      "Regeneration"
    ];

    plan.push(weekPlan);
    done.push(new Array(7).fill(false));
  }
}

function analyzeFatigue(w) {

  if (w === 0) return "fresh";
  if (profile.fitness > 70) return "fresh";
  if (profile.fitness < 40) return "overload";
  return "normal";
}

function render() {

  let html = "";

  for (let i = 0; i < 7; i++) {
    html += `
    <div class="day ${done[week][i] ? "done" : ""}" onclick="toggle(${i})">
      ${plan[week][i]}
    </div>`;
  }

  document.getElementById("cal").innerHTML = html;
  document.getElementById("w").innerText = week + 1;

  update();
}

function toggle(i) {
  done[week][i] = !done[week][i];

  if (done[week][i]) profile.streak++;
  else profile.streak--;

  render();
}

function update() {

  let progress = done[week].filter(x => x).length;
  let percent = Math.round((progress / 7) * 100);

  document.getElementById("bar").style.width = percent + "%";

  profile.fitness = Math.min(100, profile.fitness + percent / 10);

  document.getElementById("status").innerText =
    profile.name + " | Fitness: " + profile.fitness.toFixed(0) + " | Streak: " + profile.streak;

  coach();
}

function coach() {

  let msg = "";

  if (profile.fitness > 75) {
    msg = "🔥 Top Form! Steigerung empfohlen.";
  } else if (profile.fitness < 40) {
    msg = "⚠️ Zu wenig Belastung – mehr Training nötig.";
  } else {
    msg = "👍 Stabiler Fortschritt – weiter so!";
  }

  document.getElementById("coach").innerText = msg;
}

function next() {
  if (week < 7) {
    week++;
    render();
  }
}

function prev() {
  if (week > 0) {
    week--;
    render();
  }
}

</script>

</body>
</html>
