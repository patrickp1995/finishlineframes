<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI | Finish Line Frames</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background: #020617;
  color: white;
  font-family: Arial, sans-serif;
}

.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo { font-weight: bold; }

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #0f172a;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
}

/* GRID PLAN */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  background: #020617;
  padding: 10px;
  border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
  text-align: center;
}

.done { background: #22c55e !important; color: black; }

.progress {
  height: 12px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: #38bdf8;
  width: 0%;
}

/* MAP SIMULATION */
.map {
  height: 220px;
  background: linear-gradient(45deg,#0f172a,#111827);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}

.route {
  position: absolute;
  width: 80%;
  height: 3px;
  background: #22c55e;
  top: 50%;
  left: 10%;
}

/* DASH */
.row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.stat {
  flex: 1;
  background: #111827;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🏃 Training AI Pro</div>
</div>

<div class="container">

<!-- INPUT -->
<div class="card">
<h2>⚙️ Plan Generator</h2>

<input id="weeks" placeholder="Anzahl Wochen (z.B. 5)">
<input id="weeklyKm" placeholder="Wöchentliche km (z.B. 30)">
<input id="goal" placeholder="Ziel (5k / 10k / HM)">
<button onclick="generate()">Plan erstellen</button>
</div>

<!-- DASH -->
<div class="card">
<h3>📊 Dashboard</h3>
<div class="row">
  <div class="stat">Fitness <div id="fitness">50</div></div>
  <div class="stat">Load <div id="load">0</div></div>
  <div class="stat">Streak <div id="streak">0</div></div>
</div>
</div>

<!-- MAP -->
<div class="card">
<h3>🗺️ Route Simulation</h3>
<div class="map">
  <div class="route"></div>
</div>
<p>Pace: <span id="pace">5:30</span> min/km | HF: <span id="hr">145</span></p>
</div>

<!-- WEEK PLAN -->
<div class="card">
<h3>📅 Trainingsplan Woche <span id="w">1</span></h3>
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>

<div class="week-grid" id="grid"></div>
</div>

<!-- DETAILS -->
<div class="card">
<h3>📌 Einheit Details</h3>
<p id="details">Klick auf eine Einheit</p>
</div>

</div>

<script>

let plan = [];
let done = [];
let week = 0;

let fitness = 50;
let load = 0;
let streak = 0;

function generate() {

  let weeks = parseInt(document.getElementById("weeks").value);
  let km = parseInt(document.getElementById("weeklyKm").value);

  plan = [];
  done = [];

  for (let w = 0; w < weeks; w++) {

    let weekPlan = [
      {t:"Recovery Run", pace:"6:10", hr:135, goal:"Regeneration"},
      {t:"Intervalle", pace:"4:30", hr:170, goal:"Speed"},
      {t:"Pause", pace:"-", hr:0, goal:"Erholung"},
      {t:"Tempo Run", pace:"5:00", hr:160, goal:"Schwelle"},
      {t:"Recovery", pace:"6:20", hr:130, goal:"Fettverbrennung"},
      {t:"Long Run "+km+"km", pace:"5:45", hr:150, goal:"Ausdauer"},
      {t:"Ruhetag", pace:"-", hr:0, goal:"Erholung"}
    ];

    plan.push(weekPlan);
    done.push(new Array(7).fill(false));

    km += 2;
  }

  render();
}

function render() {

  let html = "";

  for (let i = 0; i < 7; i++) {

    html += `<div class="day ${done[week][i] ? "done":""}"
    onclick="toggle(${i})"
    onclick="show(${i})">
      ${plan[week][i].t}
    </div>`;
  }

  document.getElementById("grid").innerHTML = html;
  document.getElementById("w").innerText = week+1;

  update();
}

function toggle(i) {
  done[week][i] = !done[week][i];

  if(done[week][i]) streak++;
  else streak--;

  load += 5;

  update();
}

function show(i) {
  let d = plan[week][i];
  document.getElementById("details").innerHTML =
  `
  <b>${d.t}</b><br>
  Ziel: ${d.goal}<br>
  Pace: ${d.pace}<br>
  HF: ${d.hr}
  `;

  document.getElementById("pace").innerText = d.pace;
  document.getElementById("hr").innerText = d.hr;
}

function update() {

  fitness = Math.min(100, fitness + 0.5);

  document.getElementById("fitness").innerText = fitness.toFixed(0);
  document.getElementById("load").innerText = load;
  document.getElementById("streak").innerText = streak;
}

function next() {
  if(week < plan.length-1) week++;
  render();
}

function prev() {
  if(week > 0) week--;
  render();
}

</script>

</body>
</html>
