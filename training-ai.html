<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI | Finish Line Frames</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* NAVBAR (gleich wie Hauptseite) */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  box-sizing: border-box;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

.nav-links a {
  color: white;
  text-decoration: none;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 40px;
}

/* CARD */
.card {
  background: rgba(15,15,15,0.85);
  border: 1px solid #00ffcc;
  border-radius: 10px;
  padding: 15px;
  margin: 10px 0;
}

/* INPUTS */
input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

/* WEEK GRID */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: #111;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  font-size: 12px;
  border: 1px solid #222;
}

.day:hover {
  border-color: #00ffcc;
}

/* DETAILS BOX */
#details {
  margin-top: 10px;
  padding: 10px;
  background: rgba(0,255,204,0.08);
  border-radius: 8px;
  display: none;
}

/* GPS MAP SIMULATION */
.map {
  height: 200px;
  background: linear-gradient(135deg,#0a0a0a,#111,#0a0a0a);
  border: 1px solid #00ffcc;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}

.runner {
  width: 10px;
  height: 10px;
  background: #00ffcc;
  border-radius: 50%;
  position: absolute;
  animation: run 6s linear infinite;
}

@keyframes run {
  0% { left: 10%; top: 70%; }
  25% { left: 40%; top: 30%; }
  50% { left: 70%; top: 60%; }
  75% { left: 50%; top: 80%; }
  100% { left: 10%; top: 70%; }
}

/* PROGRESS */
.progress {
  background: #222;
  height: 10px;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: #00ffcc;
  width: 0%;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
  <div class="logo">Training AI</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="training-ai.html">AI</a></li>
    <li><a href="training-plans.html">Plans</a></li>
  </ul>
</nav>

<div class="container">

<h1>🏃‍♂️ AI Training Coach</h1>

<div class="card">
<h3>📊 Dein Ziel</h3>
<input id="km" placeholder="Wochen-km Ziel (z.B. 30)">
<button onclick="generate()">Trainingsplan erstellen</button>
</div>

<div class="card">
<h3>📅 Wochenplan</h3>
<div class="calendar" id="cal"></div>
</div>

<div class="card">
<h3>📍 GPS Simulation</h3>
<div class="map">
  <div class="runner"></div>
</div>
</div>

<div class="card">
<h3>📊 Details</h3>
<div id="details"></div>
</div>

</div>

<script>

let plan = [];

function generate() {

  let km = parseInt(document.getElementById("km").value);

  plan = [];

  for (let i = 0; i < 7; i++) {

    let pace = (5 + Math.random()).toFixed(2);
    let hr = 140 + Math.floor(Math.random() * 40);

    plan.push({
      name: getDay(i),
      km: (km / 5).toFixed(1),
      pace: pace,
      hr: hr
    });
  }

  render();
}

function getDay(i) {
  return ["Mo","Di","Mi","Do","Fr","Sa","So"][i];
}

function render() {

  let html = "";

  plan.forEach((p, i) => {
    html += `
      <div class="day" onclick="show(${i})">
        ${p.name}<br>
        ${p.km} km
      </div>
    `;
  });

  document.getElementById("cal").innerHTML = html;
}

function show(i) {

  let p = plan[i];

  document.getElementById("details").style.display = "block";
  document.getElementById("details").innerHTML = `
    <b>${p.name}</b><br><br>
    🏃 Distanz: ${p.km} km<br>
    ⚡ Pace: ${p.pace} min/km<br>
    ❤️ Herzfrequenz: ${p.hr} bpm
  `;
}

</script>

</body>
</html>
