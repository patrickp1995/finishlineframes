<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI | Finish Line Frames</title>

<style>
/* ================= BASE ================= */
body {
  margin: 0;
  padding-top: 70px;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

h1 {
  text-align: center;
  font-size: 50px;
  margin: 20px 0;
}

/* ================= NAVBAR (IDENTICAL) ================= */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  box-sizing: border-box;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

.nav-links li {
  position: relative;
}

.nav-links a {
  color: white;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
}

.nav-links li ul {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: rgba(0,0,0,0.95);
  padding: 10px;
  min-width: 160px;
}

.nav-links li:hover ul {
  display: block;
}

.arrow {
  font-size: 12px;
}

/* ================= BUTTONS ================= */
.buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 20px;
}

button {
  padding: 12px 20px;
  border: none;
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
}

/* ================= PLAN ================= */
.container {
  max-width: 900px;
  margin: auto;
}

.week {
  background: rgba(255,255,255,0.05);
  margin: 20px 0;
  padding: 15px;
  border-radius: 10px;
}

.day {
  background: rgba(255,255,255,0.08);
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.detail {
  display: none;
  margin-top: 10px;
  font-size: 14px;
  color: #ccc;
}
</style>
</head>

<body>

<!-- ================= NAV ================= -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>

  <ul class="nav-links">
    <li><a href="index.html">Home ▶</a></li>

    <li>
      <a href="#">Pictures ▶</a>
      <ul>
        <li><a href="#">Cars</a></li>
        <li><a href="#">Bikes</a></li>
        <li><a href="#">Nature</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Events ▶</a>
      <ul>
        <li><a href="events-running.html">Running</a></li>
        <li><a href="events-cars.html">Cars</a></li>
      </ul>
    </li>

    <li>
      <a href="#">Training ▶</a>
      <ul>
        <li><a href="training-ai.html">AI Plan</a></li>
        <li><a href="training-plans.html">Plans</a></li>
        <li><a href="training-tips.html">Tips</a></li>
      </ul>
    </li>
  </ul>
</nav>

<!-- ================= TITLE ================= -->
<h1>Training AI Coach</h1>

<!-- ================= BUTTONS ================= -->
<div class="buttons">
  <button onclick="generate('5k')">5K Plan</button>
  <button onclick="generate('10k')">10K Plan</button>
  <button onclick="generate('marathon')">Marathon Plan</button>
</div>

<!-- ================= OUTPUT ================= -->
<div class="container" id="output"></div>

<script>

function generate(type) {

  let weeks = 8;
  let html = "";

  for (let w = 1; w <= weeks; w++) {

    html += `<div class="week">
      <h2>Week ${w} - ${type.toUpperCase()}</h2>`;

    let baseKm =
      type === "5k" ? 3 :
      type === "10k" ? 6 :
      12;

    for (let d = 1; d <= 6; d++) {

      let session = getSession(d, baseKm, type, w);

      html += `
      <div class="day" onclick="toggle(this)">
        <strong>${session.name}</strong>

        <div class="detail">
          <p>📏 Distance: ${session.km} km</p>
          <p>🏃 Pace: ${session.pace} min/km</p>
          <p>❤️ HR: ${session.hr} bpm</p>
          <p>🎯 Goal: ${session.goal}</p>
          <p>🧠 Strategy: ${session.strategy}</p>
        </div>
      </div>`;
    }

    html += `</div>`;
  }

  document.getElementById("output").innerHTML = html;
}

function getSession(day, baseKm, type, week) {

  const sessions = [
    {
      name: "Recovery Run",
      km: baseKm - 1,
      pace: "6:30 - 7:30",
      hr: "120-140",
      goal: "Regeneration",
      strategy: "Easy pace to recover"
    },
    {
      name: "Intervals",
      km: baseKm,
      pace: "4:30 - 5:00",
      hr: "160-180",
      goal: "Speed",
      strategy: "Short fast repeats"
    },
    {
      name: "Rest Day",
      km: 0,
      pace: "-",
      hr: "-",
      goal: "Rest",
      strategy: "Full recovery"
    },
    {
      name: "Tempo Run",
      km: baseKm + 1,
      pace: "5:00 - 5:30",
      hr: "150-170",
      goal: "Threshold",
      strategy: "Controlled hard effort"
    },
    {
      name: "Easy Run",
      km: baseKm,
      pace: "6:00 - 6:45",
      hr: "130-150",
      goal: "Base endurance",
      strategy: "Comfortable run"
    },
    {
      name: "Long Run",
      km: baseKm + week,
      pace: "5:45 - 6:30",
      hr: "140-155",
      goal: "Endurance",
      strategy: "Slow long distance"
    }
  ];

  return sessions[day - 1];
}

function toggle(el) {
  let d = el.querySelector(".detail");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
