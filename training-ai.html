<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI | Finish Line Frames</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { font-weight: bold; }

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-top: 30px;
}

/* BUTTONS */
.btns {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin: 20px 0;
}

button {
  padding: 12px 18px;
  background: transparent;
  border: 1px solid #00ffcc;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #00ffcc;
  color: black;
}

/* WEEK BOX */
.week {
  background: rgba(255,255,255,0.05);
  border: 1px solid #00ffcc;
  margin: 15px 0;
  padding: 15px;
  border-radius: 10px;
}

.day {
  margin: 5px 0;
  padding: 8px;
  background: rgba(0,0,0,0.4);
  border-radius: 6px;
}

/* HR */
.hr {
  color: #00ffcc;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">Finish Line Frames</div>
</div>

<div class="container">

<h1>Training AI – Real Weekly Plans</h1>

<div class="btns">
  <button onclick="generate('5k')">5 KM</button>
  <button onclick="generate('10k')">10 KM</button>
  <button onclick="generate('hm')">HALBMARATHON</button>
  <button onclick="generate('m')">MARATHON</button>
</div>

<div id="output"></div>

</div>

<script>

function generate(type) {

  let weeks = [];

  // ===== 5K PLAN (6 WEEKS) =====
  if(type === "5k") {
    for(let w=1; w<=6; w++){
      weeks.push({
        title: "Woche " + w,
        days: [
          "Easy Run 20–30 min (Zone 2)",
          "Intervalle " + (w+2) + "x400m (Zone 4)",
          "Ruhetag",
          "Tempo Run 3 km (Zone 3-4)",
          "Easy Run 20 min",
          "Long Run 5–7 km (Zone 2)",
          "Ruhetag"
        ]
      });
    }
  }

  // ===== 10K PLAN (8 WEEKS) =====
  if(type === "10k") {
    for(let w=1; w<=8; w++){
      weeks.push({
        title: "Woche " + w,
        days: [
          "Easy Run 30–40 min",
          "Intervalle 5x800m",
          "Ruhetag",
          "Tempo Run 5–6 km",
          "Easy Run 30 min",
          "Long Run " + (8+w) + " km",
          "Ruhetag"
        ]
      });
    }
  }

  // ===== HALF MARATHON (10 WEEKS) =====
  if(type === "hm") {
    for(let w=1; w<=10; w++){
      weeks.push({
        title: "Woche " + w,
        days: [
          "Easy Run 40–50 min",
          "Intervalle 6x800m",
          "Ruhetag",
          "Tempo Run 6–10 km",
          "Recovery Run 30 min",
          "Long Run " + (12 + w*1.5).toFixed(0) + " km",
          "Ruhetag"
        ]
      });
    }
  }

  // ===== MARATHON (14 WEEKS) =====
  if(type === "m") {
    for(let w=1; w<=14; w++){
      weeks.push({
        title: "Woche " + w,
        days: [
          "Easy Run 50–60 min",
          "Intervalle 6x1000m",
          "Ruhetag",
          "Tempo Run 8–14 km",
          "Recovery Run 30–40 min",
          "Long Run " + (18 + w*1.5).toFixed(0) + " km",
          "Ruhetag"
        ]
      });
    }
  }

  render(weeks);
}

function render(weeks){

  let html = "";

  weeks.forEach(w => {

    html += `<div class="week">
      <h2>${w.title}</h2>
    `;

    w.days.forEach(d => {
      html += `<div class="day">${d}</div>`;
    });

    html += `</div>`;
  });

  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
