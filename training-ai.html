<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI Pro | Finish Line Frames</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background: black;
  color: white;
  font-family: Arial;
}

/* NAV */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.85);
  padding: 15px;
  display: flex;
  justify-content: space-between;
  z-index: 1000;
}

.navbar a {
  color: white;
  margin-right: 15px;
  text-decoration: none;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

h1 { text-align: center; }

/* CARD */
.card {
  background: rgba(20,20,20,0.9);
  border: 1px solid #00ffcc;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: #111;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  text-align: center;
  cursor: pointer;
}

.day:hover {
  border: 1px solid #00ffcc;
}

/* DETAILS */
#details {
  background: rgba(0,255,204,0.08);
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="navbar">
  <div>🏃 Training AI Pro</div>
  <div>
    <a href="index.html">Home</a>
    <a href="training-ai.html">AI</a>
  </div>
</div>

<div class="container">

<h1>🧠 Real AI Running Coach</h1>

<div class="card">
<h3>📊 Eingabe</h3>
<input id="km" placeholder="Wöchentliche km (z.B. 40)">
<input id="weeks" placeholder="Anzahl Wochen (z.B. 6)">
<button onclick="generate()">Trainingsplan erstellen</button>
</div>

<div class="card">
<h3>📅 Woche</h3>
<div class="grid" id="grid"></div>
</div>

<div class="card">
<h3>📊 Details</h3>
<div id="details"></div>
</div>

</div>

<script>

let plan = [];

function generate() {

  let weeklyKm = parseFloat(document.getElementById("km").value);
  let weeks = parseInt(document.getElementById("weeks").value);

  plan = [];

  for (let w = 0; w < weeks; w++) {

    let longRun = weeklyKm * 0.30;
    let interval = weeklyKm * 0.15;
    let tempo = weeklyKm * 0.20;
    let easy = weeklyKm * 0.20;
    let recovery = weeklyKm * 0.10;

    plan.push([
      create("Easy Run", easy),
      create("Intervalle", interval),
      create("Ruhetag", 0),
      create("Tempo Run", tempo),
      create("Recovery", recovery),
      create("Long Run", longRun),
      create("Ruhetag", 0)
    ]);

    weeklyKm += 2; // progressive overload
  }

  render(0);
}

function create(type, km) {

  let pace =
    type === "Intervalle" ? rand(4.0, 4.5) :
    type === "Tempo Run" ? rand(4.5, 5.2) :
    type === "Long Run" ? rand(5.3, 6.3) :
    type === "Recovery" ? rand(6.5, 7.5) :
    type === "Easy Run" ? rand(5.5, 6.5) :
    0;

  let hr =
    type === "Intervalle" ? randInt(165,185) :
    type === "Tempo Run" ? randInt(155,170) :
    type === "Long Run" ? randInt(145,160) :
    type === "Recovery" ? randInt(120,140) :
    0;

  return { type, km: km.toFixed(1), pace, hr };
}

function rand(min,max){
  return (Math.random()*(max-min)+min).toFixed(2);
}

function randInt(min,max){
  return Math.floor(Math.random()*(max-min)+min);
}

function render(w){

  let html = "";

  plan[w].forEach((d,i)=>{
    html += `
      <div class="day" onclick="show(${w},${i})">
        ${d.type}<br>${d.km} km
      </div>
    `;
  });

  document.getElementById("grid").innerHTML = html;
}

function show(w,i){

  let d = plan[w][i];

  let mapLink = "";

  if(d.type !== "Ruhetag") {
    mapLink = `
      <br><br>
      <a target="_blank"
      href="https://www.google.com/maps/dir/?api=1&origin=Vienna&destination=Vienna&travelmode=walking">
      🗺 Route in Google Maps öffnen
      </a>
    `;
  }

  document.getElementById("details").style.display = "block";
  document.getElementById("details").innerHTML = `
    <b>${d.type}</b><br><br>
    🏃 km: ${d.km}<br>
    ⚡ Pace: ${d.pace || "-"} min/km<br>
    ❤️ HF: ${d.hr || "-"} bpm
    ${mapLink}
  `;
}

</script>

</body>
</html>
