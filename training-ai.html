<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI Level Up</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background: #020617;
  color: white;
  font-family: Arial, sans-serif;
}

.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  z-index: 1000;
}

.logo { font-weight: bold; }

.nav-links {
  display: flex;
  gap: 20px;
  list-style: none;
}

.nav-links a {
  color: white;
  text-decoration: none;
}

.menu-toggle {
  display: none;
  cursor: pointer;
}

/* CONTENT */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  font-weight: bold;
  cursor: pointer;
}

/* CALENDAR */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  background: #020617;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  font-size: 11px;
  cursor: pointer;
}

.done { background: #22c55e; color: black; }

.progress {
  height: 12px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: #38bdf8;
}

@media(max-width:768px){
  .menu-toggle{display:block;}
  .nav-links{
    display:none;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
  <div class="logo">Training AI ⚡</div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="events-running.html">Events</a></li>
    <li><a href="training-ai.html">AI</a></li>
  </ul>

  <div class="menu-toggle">☰</div>
</nav>

<!-- APP -->
<div class="container">

<h2>🤖 AI Coach Level Up</h2>

<div class="card">
  <select id="goal">
    <option value="5">5K</option>
    <option value="10">10K</option>
    <option value="21">Half Marathon</option>
  </select>

  <input id="km" placeholder="Aktuelle km (z.B. 5)">
  <input id="name" placeholder="Name">
  <button onclick="start()">Plan starten</button>
</div>

<div class="card">
  <h3>Woche <span id="w">1</span></h3>
  <div class="calendar" id="cal"></div>
</div>

<div class="card">
  <h3>📊 Fortschritt</h3>
  <div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div class="card">
  <h3>🧠 AI Coach</h3>
  <p id="coach"></p>
</div>

</div>

<script>

let plan = [];
let done = [];
let week = 0;

let profile = {
  fitness: 50,
  stress: 0
};

function start(){
  let km = parseFloat(document.getElementById("km").value);
  let goal = document.getElementById("goal").value;

  generate(km, goal);
  render();
}

/* =======================
   AI LOGIC (LEVEL UP)
======================= */
function generate(baseKm, goal){

  plan = [];
  done = [];

  let km = baseKm;

  for(let w=0; w<8; w++){

    let intensity = getIntensity(goal, w, profile.fitness);

    if(intensity === "low") km += 0.5;
    if(intensity === "high") km += 1.5;

    let weekPlan = [
      "Easy " + km.toFixed(1) + " km",
      "Intervals",
      "Recovery",
      "Tempo Run",
      "Rest",
      "Long " + (km+2).toFixed(1) + " km",
      "Easy Jog"
    ];

    plan.push(weekPlan);
    done.push(new Array(7).fill(false));
  }
}

function getIntensity(goal, w, fitness){

  if(goal == 5){
    if(fitness < 45) return "low";
    if(w > 4) return "high";
  }

  if(goal == 10){
    if(fitness < 50) return "low";
    if(w > 5) return "high";
  }

  if(goal == 21){
    if(fitness < 60) return "low";
    if(w > 6) return "high";
  }

  return "normal";
}

/* =======================
   RENDER
======================= */
function render(){

  let html = "";

  for(let i=0;i<7;i++){
    html += `
      <div class="day ${done[week][i] ? "done" : ""}"
      onclick="toggle(${i})">
        ${plan[week][i]}
      </div>
    `;
  }

  document.getElementById("cal").innerHTML = html;
  document.getElementById("w").innerText = week+1;

  update();
}

function toggle(i){
  done[week][i] = !done[week][i];

  if(done[week][i]) profile.fitness += 1;
  else profile.fitness -= 1;

  render();
}

/* =======================
   UPDATE + AI COACH
======================= */
function update(){

  let count = done[week].filter(x=>x).length;
  let percent = (count/7)*100;

  document.getElementById("bar").style.width = percent + "%";

  let msg = "";

  if(profile.fitness > 75){
    msg = "🔥 Peak Form – du kannst steigern!";
  } else if(profile.fitness < 40){
    msg = "⚠️ Zu wenig Belastung – mehr lockeres Training!";
  } else {
    msg = "👍 Stabiler Fortschritt – perfekt im Aufbau!";
  }

  document.getElementById("coach").innerText = msg;
}

</script>

</body>
</html>
