<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Running Coach V5 | Finish Line Frames</title>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background: black;
  color: white;
  font-family: Arial;
}

.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.85);
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

h1 { text-align: center; }

.card {
  background: rgba(20,20,20,0.9);
  border: 1px solid #00ffcc;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00ffcc;
  font-weight: bold;
}

/* WEEK */
.week {
  margin-bottom: 20px;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 10px;
}

.week-title {
  color: #00ffcc;
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: #111;
  padding: 10px;
  border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
  text-align: center;
}

.day:hover {
  border: 1px solid #00ffcc;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.box {
  flex: 1;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

#details {
  margin-top: 10px;
  background: rgba(0,255,204,0.08);
  padding: 10px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="navbar">
  <div>🧠 AI Coach V5</div>
  <div><a href="index.html" style="color:white">Home</a></div>
</div>

<div class="container">

<h1>🏃 AI Running Coach V5</h1>

<div class="card">
<h3>📊 Eingabe</h3>
<input id="km" placeholder="Wöchentliche km (z.B. 40)">
<input id="weeks" placeholder="Wochen (z.B. 6)">
<button onclick="generate()">Start AI Coach</button>
</div>

<div class="card stats">
  <div class="box">Fitness<br><span id="fitness">50</span></div>
  <div class="box">Fatigue<br><span id="fatigue">0</span></div>
  <div class="box">Zielzeit 10K<br><span id="race">--</span></div>
</div>

<div id="output"></div>

<div class="card">
<h3>📊 Details</h3>
<div id="details"></div>
</div>

</div>

<script>

let plan = [];
let fitness = 50;
let fatigue = 0;

function generate() {

  let baseKm = parseFloat(document.getElementById("km").value);
  let weeks = parseInt(document.getElementById("weeks").value);

  plan = [];

  for (let w = 0; w < weeks; w++) {

    let stressFactor = fitness < 40 ? 0.85 : fitness > 70 ? 1.1 : 1;

    let km = (baseKm + w * 2) * stressFactor;

    let weekFatigue = Math.max(0, fatigue - 5 + w);

    if (weekFatigue > 20) km *= 0.9; // deload

    plan.push([
      create("Easy Run", km * 0.20),
      create("Intervalle", km * 0.15),
      create("Recovery", km * 0.10),
      create("Tempo Run", km * 0.20),
      create("Ruhetag", 0),
      create("Long Run", km * 0.30),
      create("Easy Run", km * 0.05)
    ]);

    fitness = Math.min(100, fitness + 3);
    fatigue = Math.max(0, fatigue + 4);
  }

  updateStats();
  render();
}

function create(type, km) {

  let pace =
    fitness > 70 ? rand(4.2,5.2) :
    fitness > 50 ? rand(4.8,5.8) :
    rand(5.2,6.5);

  let hr =
    fitness > 70 ? randInt(145,165) :
    fitness > 50 ? randInt(150,175) :
    randInt(155,185);

  return { type, km: km.toFixed(1), pace, hr };
}

function render() {

  let out = "";

  plan.forEach((week, w)=>{

    out += `<div class="week">
      <div class="week-title">📅 Woche ${w+1}</div>
      <div class="grid">`;

    week.forEach((d,i)=>{
      out += `
        <div class="day" onclick="show(${w},${i})">
          ${d.type}<br>${d.km} km
        </div>
      `;
    });

    out += `</div></div>`;
  });

  document.getElementById("output").innerHTML = out;
}

function show(w,i){

  let d = plan[w][i];

  let mapLink = d.type !== "Ruhetag"
    ? `<br><a target="_blank" href="https://www.google.com/maps/dir/?api=1&origin=Vienna&destination=Vienna">
       🗺 Route in Google Maps</a>` : "";

  document.getElementById("details").style.display = "block";
  document.getElementById("details").innerHTML = `
    <b>${d.type}</b><br><br>
    🏃 km: ${d.km}<br>
    ⚡ Pace: ${d.pace}<br>
    ❤️ HF: ${d.hr}
    ${mapLink}
  `;
}

function updateStats(){

  document.getElementById("fitness").innerText = fitness.toFixed(0);
  document.getElementById("fatigue").innerText = fatigue.toFixed(0);

  let race = 55 - (fitness / 3);
  document.getElementById("race").innerText = race.toFixed(1) + " min";
}

function rand(min,max){
  return (Math.random()*(max-min)+min).toFixed(2);
}

function randInt(min,max){
  return Math.floor(Math.random()*(max-min)+min);
}

</script>

</body>
</html>
