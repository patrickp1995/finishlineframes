<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI | Finish Line Frames</title>

<style>
/* ===== BASIS (wie Hauptseite) ===== */
body {
  margin: 0;
  padding-top: 70px;
  background-color: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* Hintergrundvideo */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0.35;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  box-sizing: border-box;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

.nav-links li a {
  color: white;
  text-decoration: none;
}

/* TITLE */
h1 {
  text-align: center;
  font-size: 50px;
  margin: 30px 0 10px;
  letter-spacing: 3px;
}

/* BUTTONS */
.wrapper {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.dist-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  margin: 30px 0;
}

.dist-btn {
  padding: 15px 25px;
  background: rgba(0,0,0,0.6);
  border: 1px solid #00ffcc;
  color: white;
  cursor: pointer;
  font-size: 18px;
  transition: 0.3s;
}

.dist-btn:hover {
  background: #00ffcc;
  color: black;
}

/* PLAN BOX */
.card {
  background: rgba(0,0,0,0.65);
  border: 1px solid #00ffcc;
  border-radius: 10px;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
}

/* HR ZONES */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

td, th {
  border: 1px solid #00ffcc;
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Finish Line Frames</div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="training-ai.html">Training AI</a></li>
  </ul>
</nav>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="sport.mp4" type="video/mp4">
</video>

<h1>Training AI</h1>

<div class="wrapper">

  <p>Wähle deine Distanz und starte einen echten strukturierten Trainingsplan.</p>

  <!-- BUTTONS -->
  <div class="dist-btns">
    <button class="dist-btn" onclick="loadPlan('5k')">5 KM PLAN</button>
    <button class="dist-btn" onclick="loadPlan('10k')">10 KM PLAN</button>
    <button class="dist-btn" onclick="loadPlan('hm')">HALBMARATHON</button>
    <button class="dist-btn" onclick="loadPlan('m')">MARATHON</button>
  </div>

  <!-- OUTPUT -->
  <div id="output" class="card">
    <h2>Wähle eine Distanz</h2>
  </div>

</div>

<script>

function loadPlan(type) {

  let plan = "";

  if(type === "5k") {
    plan = `
    <h2>🏃 5KM PROFESSIONELL PLAN</h2>
    <p><b>Ziel:</b> Schnelligkeit + saubere Pace Kontrolle</p>

    <ul>
      <li>Tag 1: Intervalle (6x400m schnell)</li>
      <li>Tag 2: Easy Run 20–30 min</li>
      <li>Tag 3: Ruhetag</li>
      <li>Tag 4: Tempo Run 3–4 km</li>
      <li>Tag 5: Easy Run</li>
      <li>Tag 6: Long Run 6–8 km</li>
      <li>Tag 7: Ruhe</li>
    </ul>

    <h3>❤️ Herzfrequenz</h3>
    <p>Zone 2: 60–75% (Ausdauer)<br>
    Zone 4: Intervalle (85–92%)</p>
    `;
  }

  if(type === "10k") {
    plan = `
    <h2>🏃 10KM PLAN</h2>
    <p><b>Ziel:</b> Ausdauer + Tempo Stabilität</p>

    <ul>
      <li>Intervalle 5x800m</li>
      <li>Easy Run 40 min</li>
      <li>Tempo Run 5–7 km</li>
      <li>Long Run 10–14 km</li>
      <li>Ruhetage integriert</li>
    </ul>

    <h3>❤️ Herzfrequenz</h3>
    <p>Zone 2–3 für Aufbau<br>Zone 4 für Tempo</p>
    `;
  }

  if(type === "hm") {
    plan = `
    <h2>🏃 HALBMARATHON PLAN</h2>
    <p><b>Ziel:</b> Ausdauer + Fettstoffwechsel + Pace Kontrolle</p>

    <ul>
      <li>Long Run 16–22 km</li>
      <li>Tempo Runs 8–12 km</li>
      <li>Easy Runs 40–60 min</li>
      <li>Intervalle 1x pro Woche</li>
      <li>1–2 Ruhetage</li>
    </ul>

    <h3>❤️ Herzfrequenz</h3>
    <p>Zone 2 dominant (70%)<br>Zone 3–4 für Tempo</p>
    `;
  }

  if(type === "m") {
    plan = `
    <h2>🏃 MARATHON PLAN</h2>
    <p><b>Ziel:</b> Ausdauer, mentale Stärke, Fettverbrennung</p>

    <ul>
      <li>Long Run 25–32 km</li>
      <li>Easy Runs 60–90 min</li>
      <li>Tempo Runs 10–15 km</li>
      <li>Recovery Runs</li>
      <li>Ruhetage extrem wichtig</li>
    </ul>

    <h3>❤️ Herzfrequenz</h3>
    <p>Zone 2 (Hauptbereich)<br>Zone 3 max 20%</p>
    `;
  }

  document.getElementById("output").innerHTML = plan;
}

</script>

</body>
</html>
