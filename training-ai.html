<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training AI Pro | Finish Line Frames</title>

<!-- LEAFLET MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  padding-top: 70px;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

/* NAV */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: space-between;
  z-index: 1000;
}

.navbar a {
  color: white;
  text-decoration: none;
  margin-right: 15px;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

h1 { text-align: center; }

/* CARD */
.card {
  background: rgba(20,20,20,0.9);
  border: 1px solid #00ffcc;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

/* INPUTS */
input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00ffcc;
  font-weight: bold;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: #111;
  border-radius: 8px;
  padding: 10px;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  border: 1px solid #222;
}

.day:hover {
  border-color: #00ffcc;
}

/* MAP */
#map {
  height: 300px;
  border-radius: 10px;
  margin-top: 10px;
}

/* DETAILS */
#details {
  margin-top: 10px;
  background: rgba(0,255,204,0.08);
  padding: 10px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="navbar">
  <div>🏃 Training AI Pro</div>
  <div>
    <a href="index.html">Home</a>
    <a href="training-ai.html">AI</a>
  </div>
</div>

<div class="container">

<h1>🧠 AI Laufcoach Pro</h1>

<div class="card">
<h3>📊 Eingabe</h3>
<input id="km" placeholder="Wochen-km Ziel (z.B. 35)">
<input id="weeks" placeholder="Anzahl Wochen (z.B. 6)">
<button onclick="generate()">Plan erstellen</button>
</div>

<div class="card">
<h3>📅 Trainingsplan</h3>
<div class="grid" id="grid"></div>
</div>

<div class="card">
<h3>📍 Laufroute (OpenStreetMap)</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>📊 Details</h3>
<div id="details"></div>
</div>

</div>

<script>

let plan = [];
let map;
let routeLine;

function initMap() {
  map = L.map('map').setView([48.2082, 16.3738], 13); // Wien

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

initMap();

function generate() {

  let km = parseInt(document.getElementById("km").value);
  let weeks = parseInt(document.getElementById("weeks").value);

  plan = [];

  for (let w = 0; w < weeks; w++) {

    let week = [];

    week.push(create("Easy Run", km * 0.6));
    week.push(create("Intervalle", km * 0.5));
    week.push(create("Recovery", km * 0.3));
    week.push(create("Tempo Run", km * 0.7));
    week.push(create("Rest", 0));
    week.push(create("Long Run", km * 1.2));
    week.push(create("Easy Run", km * 0.4));

    plan.push(week);

    km += 2; // progressive overload
  }

  render(0);
}

function create(type, km) {

  let pace =
    type === "Intervalle" ? rand(4.0, 4.5) :
    type === "Tempo Run" ? rand(4.5, 5.2) :
    type === "Long Run" ? rand(5.2, 6.2) :
    type === "Recovery" ? rand(6.5, 7.5) :
    rand(5.5, 6.5);

  let hr =
    type === "Intervalle" ? randInt(165, 185) :
    type === "Tempo Run" ? randInt(155, 170) :
    type === "Long Run" ? randInt(145, 160) :
    type === "Recovery" ? randInt(120, 140) :
    randInt(135, 150);

  return {
    type,
    km: km.toFixed(1),
    pace,
    hr
  };
}

function rand(min,max){
  return (Math.random()*(max-min)+min).toFixed(2);
}

function randInt(min,max){
  return Math.floor(Math.random()*(max-min)+min);
}

function render(weekIndex) {

  let html = "";

  plan[weekIndex].forEach((d,i)=>{

    html += `
      <div class="day" onclick="show(${weekIndex},${i})">
        ${d.type}<br>${d.km} km
      </div>
    `;
  });

  document.getElementById("grid").innerHTML = html;
}

function show(w,i){

  let d = plan[w][i];

  document.getElementById("details").style.display = "block";
  document.getElementById("details").innerHTML = `
    <b>${d.type}</b><br><br>
    🏃 Distanz: ${d.km} km<br>
    ⚡ Pace: ${d.pace} min/km<br>
    ❤️ Herzfrequenz: ${d.hr} bpm
  `;

  drawRoute(d.km);
}

function drawRoute(km){

  if(routeLine){
    map.removeLayer(routeLine);
  }

  let points = [];
  let lat = 48.2082;
  let lng = 16.3738;

  for(let i=0;i<km*10;i++){
    points.push([lat + i*0.0002, lng + i*0.0002]);
  }

  routeLine = L.polyline(points, {color:"#00ffcc"}).addTo(map);
  map.fitBounds(routeLine.getBounds());
}

</script>

</body>
</html>
